<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3460" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  
  <!-- Network Nodes (Obsidian Graph representation) -->
  <g stroke="#4a5568" stroke-width="1.5" stroke-opacity="0.4">
    <line x1="200" y1="150" x2="350" y2="100"/>
    <line x1="350" y1="100" x2="500" y2="150"/>
    <line x1="200" y1="150" x2="250" y2="280"/>
    <line x1="500" y1="150" x2="550" y2="280"/>
    <line x1="250" y1="280" x2="400" y2="320"/>
    <line x1="550" y1="280" x2="400" y2="320"/>
    <line x1="350" y1="100" x2="400" y2="200"/>
    <line x1="500" y1="150" x2="400" y2="200"/>
  </g>
  
  <!-- Nodes -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="150" r="12" fill="#e94560"/>
    <circle cx="350" cy="100" r="10" fill="#0f3460"/>
    <circle cx="500" cy="150" r="12" fill="#e94560"/>
    <circle cx="250" cy="280" r="10" fill="#0f3460"/>
    <circle cx="550" cy="280" r="10" fill="#0f3460"/>
    <circle cx="400" cy="320" r="14" fill="#e94560"/>
    <circle cx="400" cy="200" r="16" fill="#ffffff"/>
  </g>
  
  <!-- Hermes AI Agent Icon (Central) -->
  <g transform="translate(400, 200)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="24" fill="url(#glow)"/>
    <path d="M-8,-6 L-2,-6 L-2,-10 L2,-10 L2,-6 L8,-6 L8,-2 L12,-2 L12,2 L8,2 L8,8 L12,8 L12,12 L8,12 L8,6 L2,6 L2,10 L-2,10 L-2,6 L-8,6 L-8,2 L-12,2 L-12,-2 L-8,-2 Z" fill="#ffffff" opacity="0.9"/>
    <circle cx="-4" cy="-2" r="2" fill="#1a1a2e"/>
    <circle cx="4" cy="-2" r="2" fill="#1a1a2e"/>
    <path d="M-4,4 Q0,7 4,4" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Labels -->
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">HERMES AGENT × OBSIDIAN VAULT</text>
  <text x="400" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">Autonomous Knowledge Organization</text>
</svg>