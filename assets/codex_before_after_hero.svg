<svg width="100%" viewBox="0 0 1280 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Obsidian Codex Plugin before and after</title>
  <desc>Before: a messy Obsidian vault shelf with notes everywhere. After Codex: a friendly robot librarian organizes the same notes into linked sections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191326"/>
      <stop offset="0.55" stop-color="#221934"/>
      <stop offset="1" stop-color="#16121f"/>
    </linearGradient>
    <linearGradient id="panel-before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c223d"/>
      <stop offset="1" stop-color="#1f182b"/>
    </linearGradient>
    <linearGradient id="panel-after" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272044"/>
      <stop offset="1" stop-color="#151e2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 36px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f7f1ff; letter-spacing: 0; }
      .subtitle { font: 500 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #c9bddf; letter-spacing: 0; }
      .label { font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f7f1ff; letter-spacing: 0; }
      .small { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #2a2134; letter-spacing: 0; }
      .tiny { font: 600 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #6e607d; letter-spacing: 0; }
      .shelf-label { font: 800 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #efe8ff; letter-spacing: 0; }
      .note-text { font: 700 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #35233f; letter-spacing: 0; }
      .line { stroke: #6f5b89; stroke-width: 2; stroke-linecap: round; opacity: 0.55; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="145" cy="120" r="110" fill="#7c5cff" opacity="0.08"/>
  <circle cx="1135" cy="585" r="135" fill="#5cc8ff" opacity="0.07"/>

  <text x="640" y="62" text-anchor="middle" class="title">From forgotten notes to a maintained vault</text>
  <text x="640" y="94" text-anchor="middle" class="subtitle">Write messy. Search by memory. Let Codex file the library.</text>

  <!-- Left panel -->
  <g filter="url(#shadow)">
    <rect x="48" y="126" width="536" height="520" rx="22" fill="url(#panel-before)" stroke="#46355d" stroke-width="2"/>
  </g>
  <rect x="76" y="156" width="220" height="46" rx="14" fill="#3a294f"/>
  <text x="100" y="186" class="label">Before</text>
  <text x="194" y="186" class="subtitle">my vault at 1:37am</text>

  <!-- Chaotic shelf frame -->
  <rect x="96" y="244" width="440" height="302" rx="10" fill="#21182d" stroke="#5a426f" stroke-width="3"/>
  <rect x="116" y="312" width="400" height="10" rx="5" fill="#6b4d82"/>
  <rect x="116" y="405" width="400" height="10" rx="5" fill="#6b4d82"/>
  <rect x="116" y="498" width="400" height="10" rx="5" fill="#6b4d82"/>

  <!-- Messy books and notes -->
  <g transform="rotate(-8 146 278)">
    <rect x="126" y="238" width="42" height="74" rx="5" fill="#f6d365"/>
    <text x="147" y="278" text-anchor="middle" class="note-text">crypto?</text>
  </g>
  <g transform="rotate(6 204 274)">
    <rect x="184" y="230" width="42" height="82" rx="5" fill="#fda085"/>
    <text x="205" y="275" text-anchor="middle" class="note-text">dev</text>
  </g>
  <g transform="rotate(-17 264 267)">
    <rect x="244" y="214" width="42" height="98" rx="5" fill="#9be7c4"/>
    <text x="265" y="267" text-anchor="middle" class="note-text">old</text>
  </g>
  <g transform="rotate(12 330 277)">
    <rect x="304" y="246" width="78" height="44" rx="7" fill="#fff0a8"/>
    <text x="343" y="273" text-anchor="middle" class="note-text">where is it??</text>
  </g>
  <g transform="rotate(-5 426 270)">
    <rect x="392" y="232" width="68" height="58" rx="7" fill="#d6bcfa"/>
    <text x="426" y="266" text-anchor="middle" class="note-text">random.md</text>
  </g>

  <g transform="rotate(9 156 365)">
    <rect x="124" y="334" width="72" height="52" rx="7" fill="#ffd1dc"/>
    <text x="160" y="365" text-anchor="middle" class="note-text">coinbase api</text>
  </g>
  <g transform="rotate(-12 256 360)">
    <rect x="224" y="328" width="64" height="58" rx="7" fill="#bde0fe"/>
    <text x="256" y="362" text-anchor="middle" class="note-text">supabase pas</text>
  </g>
  <g transform="rotate(4 360 356)">
    <rect x="322" y="328" width="76" height="56" rx="7" fill="#caffbf"/>
    <text x="360" y="361" text-anchor="middle" class="note-text">vercel pass</text>
  </g>
  <g transform="rotate(-20 456 362)">
    <rect x="430" y="328" width="52" height="64" rx="7" fill="#ffc6ff"/>
    <text x="456" y="365" text-anchor="middle" class="note-text">???</text>
  </g>

  <path d="M132 444 C184 430, 238 474, 286 448 S382 414, 478 456" fill="none" stroke="#f5c2ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 10" opacity="0.8"/>
  <text x="316" y="470" text-anchor="middle" class="tiny" fill="#d8c8e8">searching: that one note...</text>

  <rect x="120" y="564" width="392" height="38" rx="12" fill="#332445"/>
  <text x="316" y="589" text-anchor="middle" class="subtitle">One folder. Seven future search paths. Mild despair.</text>

  <!-- Center transformation -->
  <g>
    <path d="M606 370 C640 324, 675 324, 709 370" fill="none" stroke="#bda0ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M709 370 L682 350 M709 370 L680 388" fill="none" stroke="#bda0ff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="640" cy="362" r="50" fill="#211832" stroke="#8064bf" stroke-width="3"/>
    <text x="640" y="354" text-anchor="middle" class="shelf-label">Codex</text>
    <text x="640" y="376" text-anchor="middle" class="tiny" fill="#cbb8ee">maintains</text>
  </g>

  <!-- Right panel -->
  <g filter="url(#shadow)">
    <rect x="696" y="126" width="536" height="520" rx="22" fill="url(#panel-after)" stroke="#3a5872" stroke-width="2"/>
  </g>
  <rect x="724" y="156" width="246" height="46" rx="14" fill="#263952"/>
  <text x="748" y="186" class="label">After Codex</text>
  <text x="898" y="186" class="subtitle">same notes, findable</text>

  <!-- Organized shelf -->
  <rect x="742" y="234" width="312" height="332" rx="12" fill="#172332" stroke="#4c6a86" stroke-width="3"/>
  <rect x="760" y="294" width="276" height="9" rx="4" fill="#55708b"/>
  <rect x="760" y="359" width="276" height="9" rx="4" fill="#55708b"/>
  <rect x="760" y="424" width="276" height="9" rx="4" fill="#55708b"/>
  <rect x="760" y="489" width="276" height="9" rx="4" fill="#55708b"/>

  <g>
    <rect x="774" y="250" width="118" height="31" rx="8" fill="#6d5dfc"/>
    <text x="833" y="271" text-anchor="middle" class="shelf-label">Sources</text>
    <rect x="904" y="246" width="20" height="48" rx="5" fill="#f6d365"/>
    <rect x="930" y="246" width="20" height="48" rx="5" fill="#fda085"/>
    <rect x="956" y="246" width="20" height="48" rx="5" fill="#9be7c4"/>
  </g>
  <g>
    <rect x="774" y="315" width="118" height="31" rx="8" fill="#2fbf9f"/>
    <text x="833" y="336" text-anchor="middle" class="shelf-label">Concepts</text>
    <rect x="904" y="311" width="20" height="48" rx="5" fill="#caffbf"/>
    <rect x="930" y="311" width="20" height="48" rx="5" fill="#bde0fe"/>
    <rect x="956" y="311" width="20" height="48" rx="5" fill="#fff0a8"/>
  </g>
  <g>
    <rect x="774" y="380" width="118" height="31" rx="8" fill="#c77dff"/>
    <text x="833" y="401" text-anchor="middle" class="shelf-label">Entities</text>
    <rect x="904" y="376" width="20" height="48" rx="5" fill="#d6bcfa"/>
    <rect x="930" y="376" width="20" height="48" rx="5" fill="#ffc6ff"/>
    <rect x="956" y="376" width="20" height="48" rx="5" fill="#ffd1dc"/>
  </g>
  <g>
    <rect x="774" y="445" width="118" height="31" rx="8" fill="#48a9ff"/>
    <text x="833" y="466" text-anchor="middle" class="shelf-label">Indexes</text>
    <path d="M908 452 H984" class="line"/>
    <path d="M918 464 H1004" class="line"/>
    <path d="M908 476 H972" class="line"/>
  </g>
  <g>
    <rect x="774" y="510" width="168" height="31" rx="8" fill="#ffb86b"/>
    <text x="858" y="531" text-anchor="middle" class="shelf-label">Archive Originals</text>
    <rect x="958" y="506" width="20" height="48" rx="5" fill="#7a5c3a"/>
    <rect x="984" y="506" width="20" height="48" rx="5" fill="#8f7047"/>
  </g>

  <!-- Robot librarian -->
  <g transform="translate(1068 292)">
    <rect x="28" y="86" width="82" height="116" rx="18" fill="#e8f3ff" stroke="#7aa7c7" stroke-width="4"/>
    <rect x="16" y="20" width="106" height="84" rx="24" fill="#f4fbff" stroke="#7aa7c7" stroke-width="4"/>
    <circle cx="50" cy="61" r="8" fill="#4d2f79"/>
    <circle cx="88" cy="61" r="8" fill="#4d2f79"/>
    <path d="M52 82 Q69 94 86 82" fill="none" stroke="#4d2f79" stroke-width="4" stroke-linecap="round"/>
    <line x1="69" y1="20" x2="69" y2="-12" stroke="#7aa7c7" stroke-width="4" stroke-linecap="round"/>
    <circle cx="69" cy="-17" r="7" fill="#c77dff"/>
    <path d="M30 112 C-8 112 -6 152 28 150" fill="none" stroke="#e8f3ff" stroke-width="18" stroke-linecap="round"/>
    <path d="M108 116 C152 116 152 78 116 78" fill="none" stroke="#e8f3ff" stroke-width="18" stroke-linecap="round"/>
    <path d="M124 78 L106 66 M124 78 L106 91" fill="none" stroke="#e8f3ff" stroke-width="12" stroke-linecap="round"/>
    <rect x="-22" y="134" width="78" height="48" rx="8" fill="#fff0a8" stroke="#d6a945" stroke-width="3"/>
    <text x="17" y="162" text-anchor="middle" class="note-text">random.md</text>
  </g>

  <rect x="744" y="584" width="456" height="38" rx="12" fill="#223247"/>
  <text x="972" y="609" text-anchor="middle" class="subtitle">Topic, memory fragment, or exact file path: all roads lead back.</text>
</svg>
